<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#D32F2F" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <title>%WEB_TITLE%</title>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* Altura real da viewport (barras do browser no mobile); evita cortar o rodapé/tab bar */
      html,
      body {
        height: 100%;
        min-height: 100%;
        min-height: -webkit-fill-available;
      }
      body {
        overflow: hidden;
      }
      #root {
        display: flex;
        flex: 1;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }
      /*
       * iOS Safari (e alguns navegadores mobile) dão zoom ao focar campos com
       * fonte menor que 16px. Manter 16px mínimo preserva a escala da página.
       */
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
